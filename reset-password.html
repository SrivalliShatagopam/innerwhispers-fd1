<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InnerWhispers - Reset Password</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body style="background:#F2EDE8" class="flex justify-center items-center min-h-screen px-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-[#E6DDD5]">

        <h1
            class="text-3xl font-bold text-center"
            style="color:#E8724A"
        >
            Reset Password
        </h1>

        <p
            class="text-center mt-2 mb-6"
            style="color:#9A9080"
        >
            Create a new secure password
        </p>

        <form id="resetForm">

            <label
                class="block mb-2 font-medium"
                style="color:#2C2C2C"
            >
                New Password
            </label>

            <input
                id="newPassword"
                type="password"
                placeholder="Enter new password"
                class="w-full border p-3 rounded mb-3"
            >

            <label
                class="block mb-2 font-medium"
                style="color:#2C2C2C"
            >
                Confirm Password
            </label>

            <input
                id="confirmPassword"
                type="password"
                placeholder="Confirm password"
                class="w-full border p-3 rounded mb-2"
            >

            <p
                id="passwordError"
                class="text-red-500 text-sm mb-4"
            ></p>

            <button
                type="submit"
                class="w-full text-white p-3 rounded transition hover:opacity-90"
                style="background:#E8724A"
            >
                Reset Password
            </button>

        </form>

        <p
            class="text-center mt-4"
            style="color:#9A9080"
        >
            Remember your password?

            <a
                href="login.html"
                class="font-medium hover:underline"
                style="color:#E8724A"
            >
                Back to Login
            </a>
        </p>

    </div>

    <script src="js/reset-password.js"></script>

</body>
</html>
