<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/auth.css">
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen px-4">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

<h1 class="text-3xl font-bold text-center text-orange-500">
Reset Password
</h1>

<p class="text-center text-gray-500 mt-2 mb-6">
Create a new password
</p>

<form id="resetForm">

<input
id="newPassword"
type="password"
placeholder="New Password"
class="w-full border p-3 rounded mb-2"
>

<input
id="confirmPassword"
type="password"
placeholder="Confirm Password"
class="w-full border p-3 rounded mb-2"
>

<p id="passwordError"
class="text-red-500 text-sm mb-4"></p>

<button
type="submit"
class="w-full bg-orange-500 text-white p-3 rounded hover:bg-orange-600">
Reset Password
</button>

</form>

</div>

<script src="js/reset-password.js"></script>

</body>
</html>
