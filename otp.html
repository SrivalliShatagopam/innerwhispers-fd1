<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InnerWhispers - OTP Verification</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body style="background:#F2EDE8" class="flex justify-center items-center min-h-screen px-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-[#E6DDD5]">

        <h1
            class="text-3xl font-bold text-center"
            style="color:#E8724A"
        >
            Verify OTP
        </h1>

        <p
            class="text-center mt-2 mb-6"
            style="color:#9A9080"
        >
            Enter the 6-digit OTP sent to your email
        </p>

        <form id="otpForm">

            <label
                class="block mb-2 font-medium"
                style="color:#2C2C2C"
            >
                OTP Code
            </label>

            <input
                id="otp"
                type="text"
                maxlength="6"
                placeholder="123456"
                class="w-full border p-3 rounded mb-2 text-center tracking-widest"
            >

            <p
                id="otpError"
                class="text-red-500 text-sm mb-4"
            ></p>

            <button
                type="submit"
                class="w-full text-white p-3 rounded transition hover:opacity-90"
                style="background:#E8724A"
            >
                Verify OTP
            </button>

        </form>

        <p
            class="text-center mt-4"
            style="color:#9A9080"
        >
            Didn't receive the OTP?

            <a
                href="#"
                class="font-medium hover:underline"
                style="color:#E8724A"
            >
                Resend OTP
            </a>
        </p>

    </div>

    <script src="js/otp.js"></script>

</body>
</html>
