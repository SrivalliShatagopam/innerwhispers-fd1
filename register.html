<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InnerWhispers Register</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body style="background:#F2EDE8" class="flex justify-center items-center min-h-screen px-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-[#E6DDD5]">

        <h1
            class="text-3xl font-bold text-center"
            style="color:#E8724A"
        >
            InnerWhispers
        </h1>

        <p
            class="text-center mt-2 mb-6"
            style="color:#9A9080"
        >
            Create Account
        </p>

        <form id="registerForm">

            <!-- Full Name -->
            <label
                class="block mb-1"
                style="color:#2C2C2C"
            >
                Full Name
            </label>

            <input
                id="name"
                type="text"
                class="w-full border p-3 rounded mb-1"
            >

            <p
                id="nameError"
                class="text-red-500 text-sm mb-2"
            ></p>

            <!-- Email -->
            <label
                class="block mb-1"
                style="color:#2C2C2C"
            >
                Email
            </label>

            <input
                id="email"
                type="email"
                class="w-full border p-3 rounded mb-1"
            >

            <p
                id="emailError"
                class="text-red-500 text-sm mb-2"
            ></p>

            <!-- Password -->
            <label
                class="block mb-1"
                style="color:#2C2C2C"
            >
                Password
            </label>

            <input
                id="password"
                type="password"
                class="w-full border p-3 rounded mb-1"
            >

            <p
                id="strengthText"
                class="text-sm mb-2 font-medium"
            ></p>

            <!-- Password Strength Bar -->
            <div class="w-full bg-gray-200 rounded-full h-2 mb-3">
                <div
                    id="strengthBar"
                    class="h-2 rounded-full transition-all duration-300"
                ></div>
            </div>

            <p
                id="passwordError"
                class="text-red-500 text-sm mb-2"
            ></p>

            <!-- Confirm Password -->
            <label
                class="block mb-1"
                style="color:#2C2C2C"
            >
                Confirm Password
            </label>

            <input
                id="confirmPassword"
                type="password"
                class="w-full border p-3 rounded mb-1"
            >

            <p
                id="confirmError"
                class="text-red-500 text-sm mb-4"
            ></p>

            <!-- Register Button -->
            <button
                id="registerBtn"
                type="submit"
                class="w-full text-white p-3 rounded transition hover:opacity-90"
                style="background:#E8724A"
            >
                Create Account
            </button>

        </form>

        <!-- Login Link -->
        <p
            class="text-center mt-4"
            style="color:#9A9080"
        >
            Already have an account?

            <a
                href="login.html"
                class="font-medium hover:underline"
                style="color:#E8724A"
            >
                Login
            </a>
        </p>

    </div>

    <script src="js/register.js"></script>

</body>
</html>
