<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerWhispers - Profile</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body style="background:#F2EDE8" class="min-h-screen flex justify-center items-center px-4 py-8">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-[#E6DDD5]">

        <!-- Avatar Section -->
        <div class="text-center">

            <div class="relative inline-block">

                <div
                    id="avatarPreview"
                    class="w-36 h-36 rounded-full border-4 flex items-center justify-center text-5xl font-bold text-white"
                    style="background:#E8724A;border-color:#E8724A"
                >
                    S
                </div>

                <input
                    id="avatarInput"
                    type="file"
                    accept="image/*"
                    class="hidden"
                >

                <button
                    id="uploadBtn"
                    type="button"
                    class="absolute bottom-0 right-0 text-white px-3 py-1 rounded-full text-sm"
                    style="background:#E8724A"
                >
                    Edit
                </button>

            </div>

        </div>

        <!-- Display Name -->
        <div class="mt-8">

            <label
                class="block mb-2 font-medium"
                style="color:#2C2C2C"
            >
                Display Name
            </label>

            <input
                id="displayName"
                type="text"
                value="Srivalli Shatagopam"
                class="w-full border p-3 rounded"
            >

        </div>

        <!-- Bio -->
        <div class="mt-6">

            <label
                class="block mb-2 font-medium"
                style="color:#2C2C2C"
            >
                Bio
            </label>

            <textarea
                id="bio"
                rows="4"
                class="w-full border p-3 rounded"
            >Frontend Developer Intern interested in building responsive and user-friendly web applications.</textarea>

        </div>

        <!-- Settings Link -->
        <div class="mt-6">

            <a
                href="#"
                class="block text-center border p-3 rounded hover:bg-gray-50"
                style="color:#E8724A"
            >
                ⚙ Settings
            </a>

        </div>

        <!-- Save Button -->
        <div class="mt-6 flex gap-3">

            <button
                id="saveBtn"
                class="flex-1 text-white p-3 rounded transition hover:opacity-90"
                style="background:#E8724A"
            >
                Save Changes
            </button>

            <button
                id="removeBtn"
                type="button"
                class="flex-1 bg-red-500 text-white p-3 rounded transition hover:opacity-90"
            >
                Remove Photo
            </button>

        </div>
    </div>


<script src="js/profile.js"></script>

</body>
</html>
