<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InnerWhispers - Forgot Password</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body style="background:#F2F0EE" class="flex justify-center items-center min-h-screen px-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-[#E6DDD5]">

        <h1
            class="text-3xl font-bold text-center"
            style="color:#E8724A"
        >
            Forgot Password
        </h1>

        <p
            class="text-center mt-2 mb-6"
            style="color:#9A9080"
        >
            Enter your email to receive an OTP
        </p>

        <form id="forgotForm">

            <label
                class="block mb-2 font-medium"
                style="color:#2C2C2C"
            >
                Email
            </label>

            <input
                id="email"
                type="email"
                placeholder="Enter your email"
                class="w-full border p-3 rounded mb-1"
            >

            <p
                id="emailError"
                class="text-red-500 text-sm mb-4"
            ></p>

            <button
                id="sendOtpBtn"
                type="submit"
                class="w-full text-white p-3 rounded transition hover:opacity-90"
                style="background:#E8724A"
            >
                Send OTP
            </button>

        </form>

        <p
            class="text-center mt-4"
            style="color:#9A9080"
        >
            <a
                href="login.html"
                class="font-medium hover:underline"
                style="color:#E8724A"
            >
                Back to Login
            </a>
        </p>

    </div>

    <script src="js/forgot-password.js"></script>

</body>
</html>
