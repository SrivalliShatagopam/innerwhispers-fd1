<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/auth.css">
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen px-4">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

<h1 class="text-3xl font-bold text-center text-orange-500">
Forgot Password
</h1>

<p class="text-center text-gray-500 mt-2 mb-6">
Enter your email to receive an OTP
</p>

<form id="forgotForm">

<label class="block mb-2 font-medium">
Email
</label>

<input
id="email"
type="email"
placeholder="Enter your email"
class="w-full border p-3 rounded mb-1"
>

<p id="emailError"
class="text-red-500 text-sm mb-4"></p>

<button
id="sendOtpBtn"
type="submit"
class="w-full bg-orange-500 text-white p-3 rounded hover:bg-orange-600">
Send OTP
</button>

</form>

<p class="text-center mt-4">
<a href="login.html"
class="text-orange-500 font-medium">
Back to Login
</a>
</p>

</div>

<script src="js/forgot-password.js"></script>

</body>
</html>
